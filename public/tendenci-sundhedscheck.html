<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Sundhedscheck — Tendenci</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1923;
  --bg-card:#162230;
  --bg-elevated:#1b2a3a;
  --bg-input:#142029;
  --border:#253545;
  --border-hover:#35506a;
  --text:#edf2f7;
  --text-sec:#94a7b8;
  --text-muted:#5a7389;
  --accent:#3ecfa5;
  --accent-dim:rgba(62,207,165,.08);
  --accent-mid:rgba(62,207,165,.15);
  --accent-strong:rgba(62,207,165,.25);
  --red:#f87171;
  --red-soft:rgba(248,113,113,.10);
  --orange:#fbbf24;
  --orange-soft:rgba(251,191,36,.10);
  --green:#3ecfa5;
  --green-soft:rgba(62,207,165,.10);
  --radius:14px;
  --radius-sm:10px;
}

html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Outfit',system-ui,sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

.check-wrapper{max-width:680px;margin:0 auto;padding:56px 24px 80px;position:relative}

.ambient{
  position:fixed;top:-260px;left:50%;transform:translateX(-50%);
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(62,207,165,.035) 0%,transparent 65%);
  pointer-events:none;z-index:0;
}

.check-header{text-align:center;margin-bottom:48px;position:relative;z-index:1}
.check-header .pill{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--accent);background:var(--accent-dim);
  border:1px solid rgba(62,207,165,.15);
  padding:6px 16px;border-radius:100px;margin-bottom:20px;
}
.check-header .pill .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.check-header h1{font-size:clamp(1.8rem,5vw,2.6rem);font-weight:800;letter-spacing:-.04em;line-height:1.15;margin-bottom:10px}
.check-header h1 em{font-style:normal;color:var(--accent)}
.check-header p{color:var(--text-sec);font-size:.95rem;max-width:480px;margin:0 auto;font-weight:300}

.progress-wrap{margin-bottom:36px;position:relative;z-index:1}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-meta .step-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted);letter-spacing:.06em}
.progress-meta .step-count{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--accent)}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 12px rgba(62,207,165,.3)}

.question-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--radius);padding:36px 28px;
  position:relative;z-index:1;animation:slideUp .4s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.question-card .q-icon{
  width:40px;height:40px;border-radius:10px;
  background:var(--accent-dim);border:1px solid rgba(62,207,165,.12);
  display:grid;place-items:center;margin-bottom:16px;
}
.question-card .q-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.question-card .q-number{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}
.question-card h2{font-size:1.25rem;font-weight:600;line-height:1.35;margin-bottom:4px;letter-spacing:-.02em}
.question-card .q-desc{font-size:.84rem;color:var(--text-sec);margin-bottom:24px;font-weight:300}

.options{display:flex;flex-direction:column;gap:10px}
.option{
  display:flex;align-items:center;gap:14px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:14px 18px;
  cursor:pointer;transition:all .2s ease;position:relative;overflow:hidden;
}
.option::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(62,207,165,.03),transparent);opacity:0;transition:opacity .2s}
.option:hover{border-color:var(--border-hover)}
.option:hover::before{opacity:1}
.option.selected{border-color:var(--accent);background:var(--accent-dim)}
.option.selected::before{opacity:1}
.option .radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:grid;place-items:center;transition:all .2s}
.option.selected .radio{border-color:var(--accent)}
.option.selected .radio::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--accent);animation:popIn .2s ease}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.option .opt-icon{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:grid;place-items:center;position:relative;z-index:1;
  background:var(--bg-elevated);border:1px solid var(--border);
}
.option .opt-icon svg{width:14px;height:14px;stroke:var(--text-sec);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.option.selected .opt-icon{background:var(--accent-mid);border-color:rgba(62,207,165,.2)}
.option.selected .opt-icon svg{stroke:var(--accent)}
.option .opt-text{font-size:.9rem;font-weight:400;position:relative;z-index:1}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:28px}
.btn{font-family:'Outfit',sans-serif;font-weight:600;font-size:.88rem;border:none;border-radius:100px;cursor:pointer;padding:12px 28px;transition:all .2s}
.btn-back{background:transparent;color:var(--text-sec);border:1px solid var(--border)}
.btn-back:hover{border-color:var(--text-sec);color:var(--text)}
.btn-next{background:var(--accent);color:var(--bg);box-shadow:0 4px 20px rgba(62,207,165,.2)}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(62,207,165,.3)}
.btn-next:disabled{opacity:.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-next .arrow{margin-left:6px;transition:transform .2s}
.btn-next:not(:disabled):hover .arrow{transform:translateX(3px)}
.hidden{display:none !important}

.results{position:relative;z-index:1;animation:slideUp .5s ease both}
.score-ring-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:40px}
.score-ring{position:relative;width:180px;height:180px}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .bg{stroke:var(--border);fill:none;stroke-width:8}
.score-ring .fg{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.score-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-number{font-family:'JetBrains Mono',monospace;font-size:2.8rem;font-weight:700;line-height:1}
.score-of{font-size:.75rem;color:var(--text-muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
.score-verdict{margin-top:16px;font-size:1rem;font-weight:600;text-align:center}

.breakdown{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:36px}
@media(max-width:500px){.breakdown{grid-template-columns:1fr}}
.cat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px}
.cat-card .cat-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.cat-card .cat-name{font-size:.78rem;color:var(--text-sec);font-weight:500}
.cat-card .cat-score{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700}
.cat-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width 1s ease .3s}

.recs{margin-bottom:36px}
.recs h3{font-size:.7rem;font-family:'JetBrains Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:14px}
.rec-item{display:flex;gap:14px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px 18px;margin-bottom:8px}
.rec-icon{width:36px;height:36px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;background:var(--accent-dim);border:1px solid rgba(62,207,165,.12)}
.rec-icon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rec-item .rec-title{font-size:.88rem;font-weight:600;margin-bottom:2px}
.rec-item .rec-desc{font-size:.8rem;color:var(--text-sec);font-weight:300;line-height:1.5}

.pkg-rec{background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--radius);padding:28px 24px;text-align:center;margin-bottom:32px;position:relative;overflow:hidden}
.pkg-rec::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(62,207,165,.04),transparent 60%)}
.pkg-rec .pkg-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;position:relative}
.pkg-rec .pkg-name{font-size:1.5rem;font-weight:700;margin-bottom:4px;position:relative}
.pkg-rec .pkg-price{font-family:'JetBrains Mono',monospace;font-size:1rem;color:var(--accent);margin-bottom:12px;position:relative}
.pkg-rec .pkg-desc{font-size:.84rem;color:var(--text-sec);max-width:400px;margin:0 auto 20px;position:relative;font-weight:300}
.cta-btn{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:var(--bg);font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;padding:14px 36px;border-radius:100px;text-decoration:none;transition:all .2s;position:relative;box-shadow:0 4px 24px rgba(62,207,165,.2)}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(62,207,165,.3)}
.restart-link{display:block;text-align:center;margin-top:16px;font-size:.8rem;color:var(--text-muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.restart-link:hover{color:var(--text-sec)}
</style>
</head>
<body>
<div class="ambient"></div>
<div class="check-wrapper">
  <div class="check-header">
    <div class="pill"><span class="dot"></span> 2 min · 7 spørgsmål</div>
    <h1>Hvor sund er din<br>virksomheds <em>digitale motor?</em></h1>
    <p>Svar på 7 hurtige spørgsmål og få en ærlig vurdering af din online tilstedeværelse — med konkrete anbefalinger.</p>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span class="step-label" id="stepLabel">Spørgsmål 1 af 7</span>
      <span class="step-count" id="stepPct">14%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:14%"></div></div>
  </div>
  <div id="quizContainer"></div>
  <div id="resultsContainer" class="hidden"></div>
</div>
<script>
(function(){
const icons={
  megaphone:`<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  target:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`,
  search:`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  sparkles:`<svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8z"/></svg>`,
  mail:`<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/></svg>`,
  globe:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`,
  compass:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>`,
  x:`<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  pause:`<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
  tool:`<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>`,
  rocket:`<svg viewBox="0 0 24 24"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>`,
  help:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
  eye:`<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  eyeOff:`<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`,
  check:`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
  zap:`<svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
  trendUp:`<svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
  inbox:`<svg viewBox="0 0 24 24"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>`,
  send:`<svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`,
  layout:`<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>`,
  alertCircle:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  shuffle:`<svg viewBox="0 0 24 24"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>`,
  clipboard:`<svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>`,
  award:`<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>`,
  map:`<svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>`,
};

const questions=[
  {id:'ads',category:'Paid Ads',number:'01',catIcon:'megaphone',title:'Kører du betalte annoncer i dag?',desc:'Meta (Facebook/Instagram) eller Google Ads.',options:[{text:'Nej, slet ikke',icon:'x',score:0},{text:'Har prøvet det, men stoppede igen',icon:'pause',score:1},{text:'Ja, men jeg styrer det selv',icon:'tool',score:2},{text:'Ja, med et bureau eller specialist',icon:'rocket',score:3}]},
  {id:'ads_tracking',category:'Paid Ads',number:'02',catIcon:'target',title:'Ved du hvad en kunde koster dig at skaffe?',desc:'Altså din Cost Per Acquisition (CPA) fra annoncer.',options:[{text:'Aner det ikke',icon:'help',score:0},{text:'Har en fornemmelse, men ingen tal',icon:'eye',score:1},{text:'Ja, jeg tracker det nogenlunde',icon:'trendUp',score:2},{text:'Ja, jeg kender mine tal ned i detaljen',icon:'target',score:3}]},
  {id:'seo',category:'SEO & GEO',number:'03',catIcon:'search',title:'Dukker du op når folk Googler det du tilbyder?',desc:'Tænk på de søgeord dine kunder bruger.',options:[{text:'Ingen anelse',icon:'help',score:0},{text:'Slet ikke — konkurrenterne fylder alt',icon:'eyeOff',score:0},{text:'Lidt, men ikke på side 1',icon:'search',score:1},{text:'Ja, vi rangerer godt på vores nøgleord',icon:'check',score:3}]},
  {id:'geo',category:'SEO & GEO',number:'04',catIcon:'sparkles',title:'Bliver din virksomhed nævnt i AI-søgninger?',desc:'ChatGPT, Google AI Overview, Perplexity mv.',options:[{text:'Hvad er GEO?',icon:'help',score:0},{text:'Har aldrig tjekket det',icon:'search',score:0},{text:'Nej, vi dukker ikke op',icon:'eyeOff',score:1},{text:'Ja, vi er synlige i AI-svar',icon:'sparkles',score:3}]},
  {id:'email',category:'Email Marketing',number:'05',catIcon:'mail',title:'Indsamler du emails fra dine kunder eller besøgende?',desc:'Nyhedsbrev, pop-ups, lead magnets osv.',options:[{text:'Nej, overhovedet ikke',icon:'inbox',score:0},{text:'Har en liste, men sender aldrig noget',icon:'pause',score:1},{text:'Sender mails af og til',icon:'send',score:2},{text:'Har aktive flows og nyhedsbreve',icon:'zap',score:3}]},
  {id:'website',category:'Hjemmeside',number:'06',catIcon:'globe',title:'Hvordan vil du beskrive din hjemmeside?',desc:'Tænk på design, hastighed og mobiloplevelse.',options:[{text:'Har ingen hjemmeside',icon:'x',score:0},{text:'Den er forældet og trænger til kærlighed',icon:'alertCircle',score:1},{text:'Den er OK, men ikke professionel',icon:'layout',score:2},{text:'Professionel, hurtig og mobilvenlig',icon:'check',score:3}]},
  {id:'strategy',category:'Strategi',number:'07',catIcon:'compass',title:'Har du en samlet digital strategi?',desc:'En plan for hvordan kanalerne arbejder sammen.',options:[{text:'Nej, jeg tager det lidt ad hoc',icon:'shuffle',score:0},{text:'Har en idé, men ingen plan',icon:'help',score:1},{text:'Ja, men den følges ikke konsekvent',icon:'clipboard',score:2},{text:'Ja, med klare mål og opfølgning',icon:'award',score:3}]}
];

const categories=[
  {key:'Paid Ads',questions:['ads','ads_tracking']},
  {key:'SEO & GEO',questions:['seo','geo']},
  {key:'Email Marketing',questions:['email']},
  {key:'Hjemmeside',questions:['website']},
  {key:'Strategi',questions:['strategy']}
];

let current=0,answers={};
const $quiz=document.getElementById('quizContainer'),$results=document.getElementById('resultsContainer'),$progressWrap=document.getElementById('progressWrap');

function renderQuestion(){
  const q=questions[current],selectedIdx=answers[q.id]!==undefined?answers[q.id]:-1;
  $quiz.innerHTML=`
    <div class="question-card" key="${current}">
      <div class="q-icon">${icons[q.catIcon]}</div>
      <div class="q-number">${q.number} · ${q.category}</div>
      <h2>${q.title}</h2>
      <p class="q-desc">${q.desc}</p>
      <div class="options">${q.options.map((o,i)=>`
        <div class="option ${i===selectedIdx?'selected':''}" data-idx="${i}">
          <div class="opt-icon">${icons[o.icon]}</div>
          <div class="radio"></div>
          <span class="opt-text">${o.text}</span>
        </div>`).join('')}
      </div>
      <div class="nav-row">
        <button class="btn btn-back ${current===0?'hidden':''}" id="btnBack">← Tilbage</button>
        <button class="btn btn-next" id="btnNext" ${selectedIdx===-1?'disabled':''}>${current===questions.length-1?'Se resultat':'Næste'} <span class="arrow">→</span></button>
      </div>
    </div>`;
  const pct=Math.round(((current+1)/questions.length)*100);
  document.getElementById('stepLabel').textContent=`Spørgsmål ${current+1} af ${questions.length}`;
  document.getElementById('stepPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  $quiz.querySelectorAll('.option').forEach(el=>el.addEventListener('click',()=>{answers[q.id]=parseInt(el.dataset.idx);renderQuestion()}));
  const btnNext=document.getElementById('btnNext'),btnBack=document.getElementById('btnBack');
  if(btnNext)btnNext.addEventListener('click',()=>{if(answers[q.id]===undefined)return;if(current<questions.length-1){current++;renderQuestion()}else showResults()});
  if(btnBack)btnBack.addEventListener('click',()=>{if(current>0){current--;renderQuestion()}});
}

function showResults(){
  $quiz.classList.add('hidden');$progressWrap.classList.add('hidden');$results.classList.remove('hidden');
  const maxTotal=questions.length*3;let total=0;
  questions.forEach(q=>{const idx=answers[q.id]||0;total+=q.options[idx].score});
  const pct=Math.round((total/maxTotal)*100);
  const catScores=categories.map(c=>{const max=c.questions.length*3;let score=0;c.questions.forEach(qid=>{const q=questions.find(x=>x.id===qid);const idx=answers[qid]||0;score+=q.options[idx].score});return{name:c.key,score,max,pct:Math.round((score/max)*100)}});
  let verdict,verdictColor,ringColor;
  if(pct<=30){verdict='Din digitale motor mangler en tænding';verdictColor=ringColor='var(--red)'}
  else if(pct<=60){verdict='Du er i gang — men der er lav frugt at plukke';verdictColor=ringColor='var(--orange)'}
  else{verdict='Stærk position — men der er altid mere at hente';verdictColor=ringColor='var(--accent)'}
  const recIcons={'Paid Ads':'target','SEO & GEO':'search','Email Marketing':'mail','Hjemmeside':'globe','Strategi':'compass'};
  const recData={'Paid Ads':{title:'Start med betalte annoncer',desc:'Du går glip af kunder der aktivt leder efter det du tilbyder. Selv et lille budget på 3–5.000 kr/mnd kan give konkrete henvendelser.'},'SEO & GEO':{title:'Bliv synlig i søgeresultater',desc:'Dine konkurrenter tager de kunder der søger på Google og AI. SEO og GEO-optimering er en investering der vokser over tid.'},'Email Marketing':{title:'Begynd at samle emails',desc:'Hver besøgende der forlader din side uden at give sin email er en mistet mulighed. Et simpelt email-flow kan genvinde dem.'},'Hjemmeside':{title:'Opgradér din hjemmeside',desc:'Din hjemmeside er dit digitale visitkort. En langsom eller utidssvarende side koster dig kunder — også fra annoncer og SEO.'},'Strategi':{title:'Læg en samlet plan',desc:'Uden en strategi risikerer du at bruge tid og penge spredt. Én klar plan gør hver krone mere effektiv.'}};
  const recs=[];
  catScores.forEach(c=>{if(c.pct<=33&&recData[c.name])recs.push({icon:recIcons[c.name],...recData[c.name]})});
  if(recs.length===0)recs.push({icon:'trendUp',title:'Optimér det der allerede virker',desc:'Du har et godt setup — næste skridt er at finjustere og skalere de kanaler der performer bedst.'});
  let pkgName,pkgPrice,pkgDesc;
  if(pct<=30){pkgName='Basis';pkgPrice='Fra 1.995 kr./md.';pkgDesc='Du har brug for fundamentet på plads. Basis-pakken giver dig en solid start med content og performance-opfølgning.'}
  else if(pct<=60){pkgName='Pro';pkgPrice='Fra 3.995 kr./md.';pkgDesc='Du er klar til næste niveau. Pro-pakken giver dig en komplet digital afdeling med email, hjemmeside og tæt opfølgning.'}
  else{pkgName='Skræddersyet';pkgPrice='Fra 1.000 kr./md.';pkgDesc='Du har allerede et godt fundament. En skræddersyet løsning kan supplere præcis dér hvor du vil tage det næste skridt.'}
  const circumference=2*Math.PI*72,offset=circumference-(pct/100)*circumference;
  $results.innerHTML=`
    <div class="results">
      <div class="score-ring-wrap">
        <div class="score-ring">
          <svg width="180" height="180" viewBox="0 0 180 180">
            <circle class="bg" cx="90" cy="90" r="72"/>
            <circle class="fg" cx="90" cy="90" r="72" stroke="${ringColor}" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" id="scoreArc"/>
          </svg>
          <div class="score-center">
            <div class="score-number" id="scoreNum" style="color:${verdictColor}">0</div>
            <div class="score-of">af 100</div>
          </div>
        </div>
        <div class="score-verdict" style="color:${verdictColor}">${verdict}</div>
      </div>
      <div class="breakdown">${catScores.map(c=>{const col=c.pct<=33?'var(--red)':c.pct<=66?'var(--orange)':'var(--accent)';return`<div class="cat-card"><div class="cat-head"><span class="cat-name">${c.name}</span><span class="cat-score" style="color:${col}">${c.score}/${c.max}</span></div><div class="cat-bar"><div class="cat-bar-fill" style="width:0%;background:${col}" data-w="${c.pct}%"></div></div></div>`}).join('')}</div>
      <div class="recs">
        <h3>Vores anbefalinger til dig</h3>
        ${recs.map(r=>`<div class="rec-item"><div class="rec-icon">${icons[r.icon]}</div><div><div class="rec-title">${r.title}</div><div class="rec-desc">${r.desc}</div></div></div>`).join('')}
      </div>
      <div class="pkg-rec">
        <div class="pkg-label">Anbefalet pakke til dig</div>
        <div class="pkg-name">${pkgName}</div>
        <div class="pkg-price">${pkgPrice}</div>
        <div class="pkg-desc">${pkgDesc}</div>
        <a href="https://www.tendenci.dk/analyse" class="cta-btn">Få din gratis analyse →</a>
      </div>
      <div class="restart-link" id="restart">Tag testen igen</div>
    </div>`;
  setTimeout(()=>{
    document.getElementById('scoreArc').style.strokeDashoffset=offset;
    let count=0;const target=pct,dur=1200,step=dur/target;
    const counter=setInterval(()=>{count++;document.getElementById('scoreNum').textContent=count;if(count>=target)clearInterval(counter)},step);
    document.querySelectorAll('.cat-bar-fill').forEach(el=>{setTimeout(()=>el.style.width=el.dataset.w,400)});
  },100);
  document.getElementById('restart').addEventListener('click',()=>{current=0;answers={};$results.classList.add('hidden');$results.innerHTML='';$quiz.classList.remove('hidden');$progressWrap.classList.remove('hidden');renderQuestion();window.scrollTo({top:0,behavior:'smooth'})});
}
renderQuestion();
})();
</script>
</body>
</html>
